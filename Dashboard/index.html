<!DOCTYPE html>
<html>

<head>
    <title>GitHub Repo Analytics</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
</head>

<body>

<div class="sidebar">

Repositories
</div>

<div id="repoList" class="repo-list"></div>

</div>

<div class="main">

<div class="top-bar">

<div id="repoInfo"></div>

<div class="filter-bar">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="resetFilter()">Reset</button>
</div>

</div>

<!-- STATS -->
<div class="stats">

<div class="stat-box">
<div class="stat-title">Total Views</div>
<div id="totalViews" class="stat-value">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Unique Views</div>
<div id="uniqueViews" class="stat-value">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Total Clones</div>
<div id="totalClones" class="stat-value">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Unique Clones</div>
<div id="uniqueClones" class="stat-value">0</div>
</div>

</div>

<!-- STACKED CHARTS -->
<div class="chart-wrapper">
    <canvas id="viewsChart"></canvas>
</div>

<div class="chart-wrapper">
    <canvas id="clonesChart"></canvas>
</div>

<h3>Referring Sites</h3>
<table id="refTable"></table>

<h3>Popular Content</h3>
<table id="contentTable"></table>

</div>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Discord Music Bot Clones</h2>

<canvas id="chart" width="900" height="400"></canvas>

<script>

fetch("data.json")
.then(res => res.json())
.then(data => {

const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: data.dates,
        datasets: [{
            label: "Clones",
            data: data.counts,
            borderWidth: 2,
            tension: 0.3,
            pointRadius: 5
        }]
    },
    options: {
        plugins:{
            tooltip:{
                enabled:true
            }
        },
        scales:{
            y:{
                beginAtZero:true
            }
        }
    }
});

});

</script>

</body>
</html>
